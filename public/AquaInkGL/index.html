<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="Cache-Control" content="no-cache" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
        <title>流墨星河 丨 AquaInkGL</title>
        <meta name="description" content="流墨星河, AquaInkGL, WishMeLz-home, 水墨流体演示。" />
        <meta name="keywords" content="流墨星河,AquaInkGL,WishMeLz,webgl,水墨,解压" />
        <meta property="og:url" content="https://github.com/WishMelz/AquaInkGL/" />

        <script type="text/javascript" src="assets/dat.gui.min.js"></script>
        
        <style>
            /* 基础重置：确保完全不能被误选，不影响手势交互 */
            * {
                box-sizing: border-box;
                user-select: none;
                -webkit-user-select: none;
                margin: 0;
                padding: 0;
            }

            html, body {
                overflow: hidden;
                background-color: #050505;
                width: 100%;
                height: 100%;
            }

            body {
                position: fixed;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            }

            /* 流体渲染层：全屏置底 */
            canvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
            }

            /* UI 交互包裹层：对交互事件放行，只有里面的文字/按钮吃点击 */
            .ui-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                pointer-events: none;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                padding: 1.5rem;
            }

            /* 互动元素的通用恢复响应 */
            .interactive {
                pointer-events: auto;
            }

            /* 顶部轻量标题区 */
            header {
                opacity: 0.3;
                transition: opacity 0.4s ease;
            }
            header:hover {
                opacity: 0.8;
            }
            header h1 {
                font-size: 1.1rem;
                font-weight: 400;
                color: #e5e5e5;
                letter-spacing: 2px;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            }

            /* 底部低调尾栏 */
            footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.75rem;
                color: #666;
                transition: color 0.4s ease, opacity 0.4s ease;
                opacity: 0.5;
            }
            footer:hover {
                opacity: 0.9;
                color: #aaa;
            }

            .footer-left, .footer-right {
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            footer a {
                color: inherit;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 0.3rem;
                transition: color 0.2s;
            }
            footer a:hover {
                color: #ff8f66; /* 呼应 dat.gui 的亮色调 */
            }

            /* dat.gui 样式定制：使其完美融入深夜暗色环境 */
            .dg.ac {
                z-index: 20 !important;
            }
            .dg.main .close-button,
            .dg li:not(.folder),
            .dg.dialogue {
                background-color: rgba(23, 19, 17, 0.75) !important;
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .dg li:not(.folder) {
                border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
            }
            .dg .c input[type="text"] {
                background: #2a241f !important;
                color: #f6f0e8 !important;
            }
            .dg .c .slider {
                background: #302822 !important;
            }
            .dg .c .slider-fg {
                background: #ff8f66 !important;
            }
            .dg .cr.color {
                border-left: 3px solid #ff8f66 !important;
            }

            /* 移动端适配：极简至上 */
            @media (max-width: 640px) {
                .ui-overlay {
                    padding: 1rem;
                }
                .github-text, .powered-by {
                    display: none;
                }
                header h1 {
                    font-size: 0.95rem;
                }
            }
        </style>
        <script>
            window.ga = window.ga || function () {};
        </script>
    </head>
    <body>
        <canvas></canvas>

        <div class="ui-overlay">
            
            <header>
                <h1>流墨星河 丨 AquaInkGL</h1>
            </header>

            <footer class="interactive">
                <div class="footer-left">
                    <span class="brand">
                        &copy; <time id="year" datetime="2026">2026</time> WishMeLz
                    </span>
                    <span class="powered-by">Powered by ITSSE.CN</span>
                </div>

                <div class="footer-right">
                    <a href="https://github.com/WishMelz/AquaInkGL" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 查看 AquaInkGL 源码">

                        </svg>
                        <span class="github-text">Source Code</span>
                    </a>
                </div>
            </footer>
        </div>

        <script src="assets/script.js"></script>
    </body>
    <script>
        // 动态同步当前年份
        const y = document.getElementById("year");
        if (y) {
            const now = new Date().getFullYear();
            y.textContent = now;
            y.setAttribute("datetime", String(now));
        }
    </script>
</html>
